<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Products</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>📋 All Products</h1>
        </header>

        <!-- Action Bar -->
        <div class="action-bar">
            <div>
                <a th:href="@{/}" class="btn btn-secondary">🏠 Home</a>
                <a th:href="@{/products/new}" class="btn btn-primary">➕ Add New Product</a>
            </div>
        </div>

        <!-- Product Table -->
        <section>
            <h2>📦 Product Inventory</h2>

            <div th:if="${!products.isEmpty()}" class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Product Name</th>
                            <th>Price ($)</th>
                            <th>Quantity</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="product, iterStat : ${products}">
                            <td th:text="${iterStat.count}">1</td>
                            <td th:text="${product.name}">Product Name</td>
                            <td th:text="${#numbers.formatDecimal(product.price, 1, 2)}">0.00</td>
                            <td th:text="${product.quantity}">0</td>
                            <td>
                                <span th:if="${product.quantity > 0}"
                                      class="status-badge status-in-stock">In Stock</span>
                                <span th:if="${product.quantity == 0}"
                                      class="status-badge status-out-of-stock">Out of Stock</span>
                            </td>
                            <td class="action-buttons">
                                <a th:href="@{/products/edit/{id}(id=${product.id})}"
                                   class="btn btn-success btn-sm">✏️ Edit</a>
                                <a th:href="@{/products/delete/{id}(id=${product.id})}"
                                   class="btn btn-danger btn-sm"
                                   onclick="return confirm('Are you sure you want to delete this product?');">
                                    🗑️ Delete
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div th:if="${products.isEmpty()}" class="no-products">
                <p>📭</p>
                <p>No products found. Click "Add New Product" to get started!</p>
            </div>
        </section>
    </div>
</body>
</html>
