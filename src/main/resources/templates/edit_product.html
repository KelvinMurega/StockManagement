<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Product</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>✏️ Edit Product</h1>
        </header>

        <!-- Form Section -->
        <section>
            <h2>📝 Update Product Details</h2>
            <form th:action="@{/products/update/{id}(id=${product.id})}"
                  th:object="${product}" method="post" class="product-form">
                <div class="form-group">
                    <label for="name">Product Name</label>
                    <input type="text" id="name" th:field="*{name}"
                           placeholder="Enter product name" required>
                </div>
                <div class="form-group">
                    <label for="price">Price ($)</label>
                    <input type="number" id="price" th:field="*{price}"
                           placeholder="Enter price" step="0.01" min="0" required>
                </div>
                <div class="form-group">
                    <label for="quantity">Quantity</label>
                    <input type="number" id="quantity" th:field="*{quantity}"
                           placeholder="Enter quantity" min="0" required>
                </div>
                <div class="form-group" style="justify-content: flex-end;">
                    <div style="display: flex; gap: 10px;">
                        <button type="submit" class="btn btn-primary">🔄 Update Product</button>
                        <a th:href="@{/}" class="btn btn-secondary">↩️ Cancel</a>
                    </div>
                </div>
            </form>
        </section>
    </div>
</body>
</html>
