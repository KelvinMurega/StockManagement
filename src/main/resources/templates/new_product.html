<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Product</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>➕ Add New Product</h1>
        </header>

        <!-- Form Section -->
        <section>
            <h2>📝 Product Details</h2>
            <form th:action="@{/products/save}" th:object="${product}" method="post"
                  class="product-form">
                <div class="form-group">
                    <label for="name">Product Name</label>
                    <input type="text" id="name" th:field="*{name}"
                           placeholder="Enter product name" required>
                </div>
                <div class="form-group">
                    <label for="price">Price ($)</label>
                    <input type="number" id="price" th:field="*{price}"
                           placeholder="Enter price" step="0.01" min="0" required>
                </div>
                <div class="form-group">
                    <label for="quantity">Quantity</label>
                    <input type="number" id="quantity" th:field="*{quantity}"
                           placeholder="Enter quantity" min="0" required>
                </div>
                <div class="form-group" style="justify-content: flex-end;">
                    <div style="display: flex; gap: 10px;">
                        <button type="submit" class="btn btn-primary">💾 Save Product</button>
                        <a th:href="@{/}" class="btn btn-secondary">↩️ Cancel</a>
                    </div>
                </div>
            </form>
        </section>

        <!-- Existing Products Section -->
        <section>
            <h2>📋 Existing Products</h2>

            <div th:if="${!products.isEmpty()}" class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Product Name</th>
                            <th>Price ($)</th>
                            <th>Quantity</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="product, iterStat : ${products}">
                            <td th:text="${iterStat.count}">1</td>
                            <td th:text="${product.name}">Product Name</td>
                            <td th:text="${#numbers.formatDecimal(product.price, 1, 2)}">0.00</td>
                            <td th:text="${product.quantity}">0</td>
                            <td>
                                <span th:if="${product.quantity > 0}"
                                      class="status-badge status-in-stock">In Stock</span>
                                <span th:if="${product.quantity == 0}"
                                      class="status-badge status-out-of-stock">Out of Stock</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div th:if="${products.isEmpty()}" class="no-products">
                <p>📭</p>
                <p>No products yet. Use the form above to add your first product!</p>
            </div>
        </section>
    </div>
</body>
</html>
